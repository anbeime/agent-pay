# Q&A常见问题
faq:
  - question: "Can I join this hackathon fully online? Is it okay to skip the offline events?"
    answer: "Yes."
    
  - question: "Are there any requirements to register? (Can I join without a project or idea?)"
    answer: "There are no requirements for the offline events, but the online hackathon requires a final project submission."
    
  - question: "Will applications be reviewed after registering? Is it based on the information submitted?"
    answer: "Yes, a review is required."
    
  - question: "For teams, do we form our own teams or get randomly assigned?"
    answer: "You form your own team, and you can also recruit teammates in the hackathon community."