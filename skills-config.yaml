# 赛道配置
tracks:
  track1:
    id: "agent-payments"
    name: "Agent-native Payments"
    description: "基于AI Agent的支付解决方案，探索智能体驱动的自动化支付、订阅管理、微支付等创新场景"
    keywords:
      - "AI Agent"
      - "智能支付"
      - "自动化交易"
      - "微支付"
      - "订阅管理"
    example_projects:
      - "AI驱动的自动投资组合管理"
      - "基于Agent的按需付费系统"
      - "智能合约自动化执行"
      
  track2:
    id: "intelligent-markets"
    name: "Intelligent Markets"
    description: "智能市场解决方案，包括预测市场、自动化做市、AI驱动的交易决策等"
