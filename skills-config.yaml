      - "预测市场"
      - "自动化做市"
      - "AI交易"
      - "市场预测"
      - "流动性管理"
    example_projects:
      - "AI驱动的预测市场平台"
      - "智能流动性管理协议"
      - "基于机器学习的交易信号生成"
      
  track3:
    id: "agent-apps"
    name: "Agent-powered Apps"
    description: "由AI Agent驱动的创新应用，探索Agent在DeFi、社交、内容创作等领域的应用"
    keywords:
      - "AI Agent应用"
      - "DeFi Agent"
      - "社交Agent"
      - "内容创作Agent"
      - "自动化工作流"
    example_projects:
      - "AI投资顾问Agent"
      - "自动化内容创作平台"
      - "智能客服与社区管理Agent"

