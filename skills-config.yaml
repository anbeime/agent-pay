# 最后更新：2026-02-17

project:
  name: "Rebel in Paradise AI Hackathon"
  track: "AI Hackathon"
  competition: "Monad Blitz Pro Series"
  website: "https://rebel.openbuild.xyz/"
  description: "聚焦Agent-native Payments、Intelligent Markets、Agent-powered Apps三大方向的AI黑客马拉松"
  organizer: "OpenBuild & Monad"
  co_host: "SegmentFault, VibeFriends"
  
skills:
  # 系统内置技能
  builtin:
    - name: docx
      description: "Word文档创建与编辑"
      use_cases:
        - "项目方案文档"
        - "技术实现方案"
        - "商业模式文档"
        - "项目白皮书"
      priority: "high"
      
    - name: pptx
      description: "PPT演示文稿创建与编辑"
      use_cases:
        - "路演PPT"
        - "项目展示"
        - "技术演示"
      priority: "high"
      
    - name: xlsx
      description: "Excel数据处理与分析"
      use_cases:
        - "市场调研数据"
        - "竞品分析"
        - "财务预测模型"
      priority: "medium"
      
    - name: python
      description: "Python代码开发"
      use_cases:
        - "智能合约开发"
        - "Agent应用开发"
        - "数据分析脚本"
        - "自动化测试"
      priority: "high"
      
    - name: pdf
      description: "PDF文档处理"
      use_cases:
        - "白皮书生成"
        - "文档归档"
      priority: "medium"
  
  # 本地技能
  local:
    - name: hand-drawn-infographic
      file: "hand-drawn-infographic.skill"
      description: "手绘风格信息图生成"
      use_cases:
        - "系统架构图"
        - "流程图"
        - "产品原型图"
      priority: "high"
      
    - name: business-story-interview
      file: "business-story-interview.skill"
      description: "商业故事包装"
      use_cases:
        - "项目亮点提炼"
        - "创新点包装"
        - "路演故事线设计"
      priority: "medium"

