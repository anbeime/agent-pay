# 提示词模板
prompts:
  project_proposal: |
    编写Rebel AI Hackathon项目方案文档：
    1. 项目概述
       - 项目名称与口号
       - 选择的赛道方向
       - 核心创新点
    2. 问题与机会
       - 市场痛点分析
       - 目标用户群体
       - 市场机会
    3. 解决方案
       - 产品功能描述
       - 技术架构设计
       - AI Agent设计
    4. 技术实现
       - Monad区块链集成
       - 智能合约设计
       - Agent技术栈
    5. 商业模式（如适用）
    6. 竞争优势
    7. 团队介绍
    8. 发展路线图
    
    保存到：output/docs/项目方案_Rebel_20260217.docx
    
  demo_ppt: |
    制作Rebel AI Hackathon路演PPT：
    - 主题：AI + Blockchain创新应用
    - 风格：科技感+Monad品牌色
    - 页数：12-15页
    - 章节：
      1. 封面（项目名+团队+赛道）
      2. 问题陈述
      3. 解决方案概述
      4. 产品演示
      5. 技术架构
      6. AI Agent设计
      7. 区块链集成
      8. 市场分析
      9. 竞争优势
      10. 团队介绍
      11. 里程碑与规划
      12. 结束页
    
    保存到：output/ppt/路演PPT_Rebel_20260217.pptx
    
  technical_doc: |
    编写技术实现文档：
    - 系统架构说明
    - 智能合约接口文档
    - AI Agent设计文档
    - API接口文档
    - 部署指南
    - 测试用例
    
    保存到：output/docs/技术文档_Rebel_20260217.docx

