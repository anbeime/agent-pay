# 原子结构课件配音脚本
# 每个场景的解说词

scenes:
  - id: "title"
    text: "同学们好！今天我们来学习初三化学的一个重要内容，原子的结构。原子是构成物质的基本微粒之一，让我们一起探索这个神奇的微观世界吧！"
    
  - id: "basic"
    text: "原子虽然很小，但也有一定的结构。原子是由居于原子中心的带正电的原子核和核外带负电的电子构成的。大家看这个钠原子模型，中心是原子核，周围运动着电子。原子核体积很小，却集中了原子绝大部分的质量。"
    
  - id: "nucleus"
    text: "原子核虽小，但它还可以再分。科学实验证明，原子核是由质子和中子构成的。质子带正电，中子不带电。在原子中，质子数等于核电荷数，也等于核外电子数，所以原子整体不显电性。"
    
  - id: "shells"
    text: "电子在原子核外是分层排布的。电子总是先排布在能量最低的电子层里，然后依次排布在能量较高的电子层里。第一层最多容纳2个电子，第二层最多容纳8个电子。最外层电子数决定了元素的化学性质。比如碳原子，它的电子排布是2和4。"
    
  - id: "comparison"
    text: "让我们来对比一下不同原子的结构。氢原子最简单，只有1个质子和1个电子。碳原子有6个质子6个中子，电子排布为2和4。氧原子有8个质子，电子排布为2和6。钠原子有11个质子，电子排布为2、8、1。可以看到，不同原子的质子数和电子排布各不相同。"
    
  - id: "mass"
    text: "由于原子的质量很小，书写和使用都很不方便，因此科学上一般采用相对原子质量来表示。相对原子质量约等于质子数加上中子数。电子质量很小，可以忽略不计。比如钠的相对原子质量约等于11加12等于23。"
    
  - id: "summary"
    text: "让我们来总结一下今天学习的内容。第一，原子由原子核和核外电子构成。第二，原子核由质子和中子构成。第三，在原子中，质子数等于电子数等于核电荷数。第四，电子分层排布，第一层最多2个，第二层最多8个。第五，相对原子质量等于质子数加中子数。掌握原子结构，是理解物质构成的基础。这节课就上到这里，谢谢大家！"
